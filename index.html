  // 얼음 오버레이
  if (isFrozen) {
    ctx.beginPath(); ctx.arc(px, py, r+8, 0, Math.PI*2);
    ctx.fillStyle = `rgba(100,220,255,0.25)`; ctx.fill();
    ctx.beginPath(); ctx.arc(px, py, r+5, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(180,240,255,0.6)`; ctx.lineWidth = 2; ctx.stroke();
  }

  // 외곽 글로우
  ctx.globalAlpha = driftAlpha * 0.7;
  ctx.beginPath(); ctx.arc(px,py,r+6,0,Math.PI*2);
  ctx.fillStyle = isDrifting ? 'rgba(180,180,255,0.25)' : 'rgba(255,200,0,0.15)'; ctx.fill();
  ctx.globalAlpha = driftAlpha;

  if (bossType==='mirrorball') {
    // 미러볼 태양: 원 + 16개 방사 스파이크
    ctx.save(); ctx.translate(px,py); ctx.rotate(angle);
    const inner=r*0.62;
    // 스파이크
    for(let i=0;i<16;i++){
      const a=PI2/16*i, len=r*(0.45+0.12*(i%2));
      ctx.strokeStyle=`hsl(${45+i*8},100%,${isDrifting?50:70}%)`;
      ctx.lineWidth=2.5; ctx.beginPath();
      ctx.moveTo(Math.cos(a)*inner,Math.sin(a)*inner);
      ctx.lineTo(Math.cos(a)*(inner+len),Math.sin(a)*(inner+len));
      ctx.stroke();
    }
    // 코어 원
    ctx.beginPath(); ctx.arc(0,0,inner,0,Math.PI*2);
    const g=ctx.createRadialGradient(0,0,2,0,0,inner);
    g.addColorStop(0,'#fffde0'); g.addColorStop(0.5,'#ffd60a'); g.addColorStop(1,'#ff8800');
    ctx.fillStyle = isDrifting ? '#ffd60a88' : g; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
    // 패싯 선
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1;
    for(let i=0;i<6;i++){const a=PI2/6*i; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*inner*0.9,Math.sin(a)*inner*0.9); ctx.stroke();}
    ctx.restore();

  } else if (bossType==='worm') {
    // 철제 지렁이: 꼬리→머리 순서로 그려 머리가 위에 렌더됨
    const segN=14, step=5;
    for(let i=segN;i>=0;i--){
      // 머리(i===0)는 현재 실제 위치 사용, 나머지는 히스토리
      const hp = i===0 ? {x:px,y:py} : (() => {const hi=i*step; return hi<e.posHistory.length?e.posHistory[hi]:null;})();
      if(!hp) continue;
      const t=i/segN;
      const sr=r*(0.55+0.45*(1-t));
      // 방향: 바로 앞 세그먼트 위치와의 각도
      // 머리(i===0)의 경우 posHistory[0]은 현재 위치와 같으므로 posHistory[1]을 사용
      const prevHp = i===0
        ? (e.posHistory.length>1 ? e.posHistory[1] : hp)
        : (()=>{const hi2=Math.max(0,(i-1)*step); return hi2<e.posHistory.length?e.posHistory[hi2]:hp;})();
      // rage active 중 머리는 현재 속도 방향으로 고정 (당구공처럼 고정된 자세)
      const dir = (i === 0 && e.ragePhase === 'active')
        ? Math.atan2(e.vy, e.vx)
        : Math.atan2(hp.y-prevHp.y, hp.x-prevHp.x);
      ctx.save(); ctx.translate(hp.x,hp.y); ctx.rotate(dir + Math.PI/2);
      // 길쭉한 마름모: 앞 끝(진행 방향) 길게, 뒤 끝 짧게
      ctx.beginPath();
      ctx.moveTo(0, -sr*1.55);           // 앞 끝 (진행 방향)
      ctx.lineTo(-sr*0.42, 0);           // 왼쪽
      ctx.lineTo(0,  sr*0.65);           // 뒤 끝
      ctx.lineTo( sr*0.42, 0);           // 오른쪽
      ctx.closePath();
      const light=isDrifting?'50%':'65%';
      ctx.fillStyle=`hsl(${280+i*6},${i===0?'50%':'70%'},${light})`;
      ctx.fill();
      ctx.strokeStyle=`rgba(220,160,255,${0.7-t*0.4})`; ctx.lineWidth=1.5; ctx.stroke();
      // 머리에만 눈
      if(i===0){
        for(const[ox,oy]of[[-sr*0.22,-sr*0.55],[sr*0.22,-sr*0.55]]){
          ctx.beginPath(); ctx.arc(ox,oy,sr*0.18,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
          ctx.beginPath(); ctx.arc(ox,oy+sr*0.08,sr*0.09,0,Math.PI*2); ctx.fillStyle='#111'; ctx.fill();
        }
      }
      ctx.restore();
    }

  } else { // hexagon
    ctx.save(); ctx.translate(px,py); ctx.rotate(angle);
    // 외부 헥사곤
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=PI2/6*i; i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    ctx.closePath();
    const g2=ctx.createRadialGradient(0,0,3,0,0,r);
    g2.addColorStop(0,'#c0f8ff'); g2.addColorStop(0.6,'#0099cc'); g2.addColorStop(1,'#003366');
    ctx.fillStyle = isDrifting ? 'rgba(0,153,204,0.5)' : g2; ctx.fill();
    ctx.strokeStyle='#00ffff'; ctx.lineWidth=2.5; ctx.stroke();
    // 역방향 내부 헥사곤
    ctx.save(); ctx.rotate(-angle*2.2);
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=PI2/6*i+Math.PI/6; i===0?ctx.moveTo(Math.cos(a)*r*0.52,Math.sin(a)*r*0.52):ctx.lineTo(Math.cos(a)*r*0.52,Math.sin(a)*r*0.52);}
    ctx.closePath();
    ctx.strokeStyle='rgba(0,255,255,0.7)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore();
    // 중심 광점
    ctx.beginPath(); ctx.arc(0,0,r*0.13,0,Math.PI*2);
    ctx.fillStyle='#ffffff'; ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1.0; // 반드시 복원
}

function drawMinion(e, ts) {
  const {px,py,angle,r,bossType} = e;
  const isDrifting = !!e.drift;
  const driftAlpha = isDrifting ? (e.drift?.phase==='drift' ? 0.55 : 0.78) : 1.0;
  // 소환 발광
  if (e.spawnFlash > 0) {
    e.spawnFlash--;
    ctx.beginPath(); ctx.arc(px, py, r + e.spawnFlash*0.6, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,160,${e.spawnFlash/30*0.6})`; ctx.fill();
  }
  ctx.globalAlpha = driftAlpha;
  ctx.beginPath(); ctx.arc(px,py,r+3,0,Math.PI*2);
  ctx.fillStyle = isDrifting ? 'rgba(180,180,255,0.15)' : 'rgba(150,150,200,0.2)'; ctx.fill();

  if (bossType==='mirrorball') {
    ctx.save(); ctx.translate(px,py); ctx.rotate(angle);
    for(let i=0;i<8;i++){const a=PI2/8*i; ctx.strokeStyle='#ffcc44'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(Math.cos(a)*r*0.6,Math.sin(a)*r*0.6); ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r); ctx.stroke();}
    ctx.beginPath(); ctx.arc(0,0,r*0.6,0,Math.PI*2);
    ctx.fillStyle=isDrifting?'#ffd60a88':'#ffd60a'; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore();
  } else if (bossType==='worm') {
    // 미니 지렁이: 3세그먼트
    const segN=4, step=6;
    for(let i=segN;i>=0;i--){
      const hi=i*step; if(hi>=e.posHistory.length) continue;
      const hp=e.posHistory[hi]; const t=i/segN;
      const sr=r*(0.5+0.5*(1-t));
      const np=e.posHistory[Math.max(0,(i===0?0:(i-1)*step))];
      const dir=Math.atan2(np.y-hp.y,np.x-hp.x)+(i===0?0:Math.PI);
      ctx.save(); ctx.translate(hp.x,hp.y); ctx.rotate(dir-Math.PI/2);
      ctx.beginPath(); ctx.moveTo(0,-sr); ctx.lineTo(-sr*0.7,sr*0.7); ctx.lineTo(sr*0.7,sr*0.7); ctx.closePath();
      ctx.fillStyle=isDrifting?`hsla(280,60%,55%,0.5)`:`hsl(${280+i*8},65%,58%)`; ctx.fill();
      ctx.strokeStyle='rgba(200,160,255,0.7)'; ctx.lineWidth=1; ctx.stroke();
      ctx.restore();
    }
  } else { // hexagon minion
    ctx.save(); ctx.translate(px,py); ctx.rotate(angle);
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=PI2/6*i; i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    ctx.closePath();
    ctx.fillStyle=isDrifting?'rgba(0,180,220,0.4)':'#0088bb'; ctx.fill();
    ctx.strokeStyle='#00ffff'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.save(); ctx.rotate(-angle*2);
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=PI2/6*i; i===0?ctx.moveTo(Math.cos(a)*r*0.5,Math.sin(a)*r*0.5):ctx.lineTo(Math.cos(a)*r*0.5,Math.sin(a)*r*0.5);}
    ctx.closePath(); ctx.strokeStyle='rgba(0,255,255,0.5)'; ctx.lineWidth=1; ctx.stroke();
    ctx.restore(); ctx.restore();
  }
  ctx.globalAlpha = 1.0;
}

// ─── 렌더링 ────────────────────────────────────────────────────────────────
function draw(ts) {
  // ① ② ③ ④ — ImageData 단일 패스로 배경 + 점령 + 트레일 한 번에 처리
  if (!frameImageData) frameImageData = ctx.createImageData(CW, CH);
  const buf = frameImageData.data;

  if (hasImg) {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = G[r][c];
        for (let py = r * CS; py < r * CS + CS; py++) {
          for (let px = c * CS; px < c * CS + CS; px++) {
            const pi = (py * CW + px) << 2;
            if (cell === 1) {
              buf[pi]   = fullPixels[pi];   buf[pi+1] = fullPixels[pi+1];
              buf[pi+2] = fullPixels[pi+2]; buf[pi+3] = 255;
            } else if (cell === 2) {
              buf[pi] = 255; buf[pi+1] = 214; buf[pi+2] = 10; buf[pi+3] = 255;
            } else {
              buf[pi]   = darkPixels[pi];   buf[pi+1] = darkPixels[pi+1];
              buf[pi+2] = darkPixels[pi+2]; buf[pi+3] = 255;
            }
          }
        }
      }
    }
  } else {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = G[r][c];
        let R, G2, B;
        if      (cell === 1) { R = 45;  G2 = 106; B = 79; }
        else if (cell === 2) { R = 255; G2 = 214; B = 10; }
        else                 { R = 26;  G2 = 26;  B = 46; }
        for (let py = r * CS; py < r * CS + CS; py++) {
          for (let px = c * CS; px < c * CS + CS; px++) {
            const pi = (py * CW + px) << 2;
            buf[pi] = R; buf[pi+1] = G2; buf[pi+2] = B; buf[pi+3] = 255;
          }
        }
      }
    }
  }
  ctx.putImageData(frameImageData, 0, 0);

  // ⑤ 적 렌더링
  for (const e of enemies) {
    if (e.role==='boss') drawBoss(e, ts);
    else drawMinion(e, ts);
  }

  // ⑤-b 탄환 렌더링 (보스 탄환만)
  for (const e of enemies) {
    if (e.role!=='boss') continue;
    for (const b of e.bullets) {
      if (b.bomb) {
        const pulse = Math.sin(ts*0.05+b.fuze)*0.4+0.6;
        ctx.beginPath(); ctx.arc(b.x,b.y,b.r+4,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,60,0,${0.15*pulse})`; ctx.fill();
        ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,${80+Math.floor(100*pulse)},0,${0.9*pulse})`; ctx.fill();
        ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
        ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
      } else {
        ctx.beginPath(); ctx.arc(b.x,b.y,b.r+2,0,Math.PI*2);
        ctx.fillStyle='rgba(255,80,80,0.25)'; ctx.fill();
        ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fillStyle='#ff4466'; ctx.fill();
        ctx.beginPath(); ctx.arc(b.x,b.y,1.5,0,Math.PI*2);
        ctx.fillStyle='#fff'; ctx.fill();
      }
    }

    // ── 발악기 비주얼 ──────────────────────────────────────────────────
    if (e.rageData && (e.ragePhase === 'active' || e.ragePhase === 'warn')) {
      if (e.bossType === 'mirrorball') {
        const rd = e.rageData;
        if (!rd) { /* skip */ }
        else if (e.ragePhase === 'active') {
          for (const p of (rd.projectiles||[])) {
            const hw = p.halfW, beamLen = p.len || 40;
            const dx2 = Math.cos(p.angle), dy2 = Math.sin(p.angle);
            ctx.save();
            ctx.translate(p.x, p.y); ctx.rotate(p.angle);
            // 뒤 꼬리 (페이드 아웃)
            const grad = ctx.createLinearGradient(-beamLen, 0, 0, 0);
            grad.addColorStop(0, 'rgba(255,200,0,0)');
            grad.addColorStop(0.4, 'rgba(255,200,0,0.15)');
            grad.addColorStop(1, 'rgba(255,220,50,0.55)');
            ctx.fillStyle = grad;
            ctx.fillRect(-beamLen, -hw-8, beamLen, (hw+8)*2);
            // 중간 글로우
            const grad2 = ctx.createLinearGradient(-beamLen*0.6, 0, 0, 0);
            grad2.addColorStop(0, 'rgba(255,160,0,0)');
            grad2.addColorStop(1, 'rgba(255,160,0,0.5)');
            ctx.fillStyle = grad2;
            ctx.fillRect(-beamLen*0.6, -hw, beamLen*0.6, hw*2);
            // 선두 코어 빛
            ctx.beginPath(); ctx.arc(0, 0, hw*0.7, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,240,150,0.8)'; ctx.fill();
            ctx.beginPath(); ctx.arc(0, 0, hw*0.3, 0, Math.PI*2);
            ctx.fillStyle = '#ffffff'; ctx.fill();
            ctx.restore();
          }
        }
      } else if (e.bossType === 'hexagon' && e.rageData && e.rageData.mines) {
        for (const m of e.rageData.mines) {
          ctx.save();
          if (m.dropping) {
            // 낙하 중: 그림자 + 속도감 줄
            const shadowY = m.landY;
            const shadowAlpha = Math.max(0, 0.4 - (shadowY - m.y) / CH * 0.8);
            ctx.beginPath(); ctx.ellipse(m.x, shadowY, m.r*0.8, m.r*0.25, 0, 0, PI2);
            ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`; ctx.fill();
            // 낙하 궤적
            ctx.strokeStyle='rgba(255,150,0,0.3)'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
            ctx.beginPath(); ctx.moveTo(m.x, m.y-m.r); ctx.lineTo(m.x, m.y - (m.dropVy||0)*6);
            ctx.stroke(); ctx.setLineDash([]);
            ctx.translate(m.x, m.y);
          } else {
            // 착지 후: 퓨즈 비율로 팽창 펄스 (폭발 임박할수록 더 크고 빠르게)
            const fuzeRatio = m.fuze / 3000;
            const pulseFreq = 0.015 + (1 - fuzeRatio) * 0.05;
            const pulseAmp  = 0.12  + (1 - fuzeRatio) * 0.25;
            const scale = 1 + Math.abs(Math.sin(ts * pulseFreq)) * pulseAmp;
            // 폭발 범위 링
            ctx.beginPath(); ctx.arc(m.x, m.y, 50, 0, PI2);
            ctx.strokeStyle = `rgba(255,80,0,${0.1 + (1-fuzeRatio)*0.25})`; ctx.lineWidth=1; ctx.stroke();
            ctx.translate(m.x, m.y); ctx.scale(scale, scale);
          }

          const mp = m.dropping ? 0.5 : Math.abs(Math.sin(ts * (0.015 + (1-m.fuze/3000)*0.05)));
          // 몸체
          ctx.beginPath(); ctx.arc(0, 0, m.r, 0, PI2);
          ctx.fillStyle = 'rgba(30,30,30,0.92)'; ctx.fill();
          ctx.strokeStyle = `rgba(255,${100+Math.floor(155*mp)},0,${0.85})`; ctx.lineWidth=2.5; ctx.stroke();
          // 가시 8개
          for (let i=0;i<8;i++) {
            const sa = PI2/8*i;
            ctx.beginPath(); ctx.moveTo(Math.cos(sa)*m.r, Math.sin(sa)*m.r);
            ctx.lineTo(Math.cos(sa)*(m.r+7), Math.sin(sa)*(m.r+7));
            ctx.strokeStyle=`rgba(255,${160+Math.floor(95*mp)},0,0.9)`; ctx.lineWidth=2.5; ctx.stroke();
          }
          if (!m.dropping) {
            // 퓨즈 진행바
            const fuzeRatio = m.fuze / 3000;
            ctx.beginPath();
            ctx.arc(0, 0, m.r+3.5, -Math.PI/2, -Math.PI/2 + PI2*(1-fuzeRatio));
            ctx.strokeStyle=`rgba(255,${60+Math.floor(160*(1-fuzeRatio))},0,0.9)`; ctx.lineWidth=2.5; ctx.stroke();
          }
          // 아이콘
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.font=`bold ${m.dropping?7:7+mp*3}px monospace`;
          ctx.fillStyle=`rgba(255,220,0,${m.dropping?0.6:0.7+mp*0.3})`;
          ctx.fillText('☢', 0, 0);
          ctx.restore();
        }
      }
    }

    // 발악기 전조 중 보스 특수 모션
    if (e.ragePhase === 'warn') {
      const warnPulse = Math.abs(Math.sin(ts * 0.015));
      ctx.beginPath(); ctx.arc(e.px, e.py, e.r + 10 + warnPulse*8, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(255,200,0,${0.6+warnPulse*0.4})`; ctx.lineWidth=3; ctx.stroke();
      // 차징 파티클 링
      for (let i=0;i<12;i++) {
        const pa = PI2/12*i + ts*0.008;
        const pr = e.r + 20 + warnPulse*12;
        ctx.beginPath(); ctx.arc(e.px+Math.cos(pa)*pr, e.py+Math.sin(pa)*pr, 2.5, 0, Math.PI*2);
        ctx.fillStyle=`rgba(255,220,50,${0.7+warnPulse*0.3})`; ctx.fill();
      }
    }
    // 지렁이 발악 중 빨간 몸
    if (e.bossType==='worm' && e.ragePhase==='active') {
      ctx.beginPath(); ctx.arc(e.px, e.py, e.r+6, 0, Math.PI*2);
      ctx.fillStyle=`rgba(255,0,0,${0.2+Math.abs(Math.sin(ts*0.03))*0.3})`; ctx.fill();
    }
  }

  // ⑤-c 파티클
  for (const p of particles) {
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r*p.life, 0, Math.PI*2);
    ctx.fillStyle = p.col + Math.floor(p.life*255).toString(16).padStart(2,'0');
    ctx.fill();
  }

  // ⑤-d 발악기 핵경보 오버레이 (위아래 노란 줄무늬 띠)
  if (rageWarnTimer > 0) {
    const alpha = Math.min(1, rageWarnTimer/500) * 0.85;
    const stripH = 48;
    const stripes = 6;
    const offset = (ts * 0.12) % (stripH / stripes * 2);
    // 위 띠
    ctx.save(); ctx.beginPath(); ctx.rect(0,0,CW,stripH); ctx.clip();
    for (let i=-2; i<stripes+2; i++) {
      const x = i*(CW/stripes)*2 + offset*(CW/stripH);
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x+CW/stripes,0); ctx.lineTo(x+CW/stripes-stripH,stripH); ctx.lineTo(x-stripH,stripH); ctx.closePath();
      ctx.fillStyle = i%2===0 ? `rgba(255,210,0,${alpha})` : `rgba(0,0,0,${alpha*0.6})`;
      ctx.fill();
    }
    ctx.restore();
    // 아래 띠
    ctx.save(); ctx.beginPath(); ctx.rect(0,CH-stripH,CW,stripH); ctx.clip();
    for (let i=-2; i<stripes+2; i++) {
      const x = i*(CW/stripes)*2 - offset*(CW/stripH);
      ctx.beginPath(); ctx.moveTo(x,CH-stripH); ctx.lineTo(x+CW/stripes,CH-stripH); ctx.lineTo(x+CW/stripes-stripH,CH); ctx.lineTo(x-stripH,CH); ctx.closePath();
      ctx.fillStyle = i%2===0 ? `rgba(255,210,0,${alpha})` : `rgba(0,0,0,${alpha*0.6})`;
      ctx.fill();
    }
    ctx.restore();
    // 경고 텍스트
    const boss = enemies.find(e=>e.role==='boss');
    const rageName = boss ? {mirrorball:'LASER CANNON',worm:'RAMPAGE CHARGE',hexagon:'MINE BARRAGE'}[boss.bossType] : 'RAGE';
    const blk = Math.floor(ts/200)%2===0;
    ctx.save();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`bold ${18+Math.sin(ts*0.025)*3}px monospace`;
    ctx.shadowColor='#ff8800'; ctx.shadowBlur=16;
    ctx.fillStyle=blk?'#ffdd00':'#fff';
    ctx.fillText(`⚠ RAGE MODE : ${rageName} ⚠`, CW/2, 24);
    ctx.fillText(`⚠ RAGE MODE : ${rageName} ⚠`, CW/2, CH-24);
    ctx.restore();
  }
  if (warnActive && warnTimer > 0) {
    const alpha = Math.abs(Math.sin(ts*0.018)) * 0.35 * Math.min(1, warnTimer/2000);
    ctx.fillStyle = `rgba(255,0,0,${alpha})`;
    ctx.fillRect(0,0,CW,CH);
    // WARNING 텍스트
    const sz = 28 + Math.sin(ts*0.04)*4;
    ctx.save();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`bold ${sz}px Segoe UI`;
    ctx.shadowColor='#ff0000'; ctx.shadowBlur=20;
    ctx.fillStyle='#fff';
    ctx.fillText('⚠ WARNING !!!', CW/2, CH/2-18);
    ctx.font=`bold 15px Segoe UI`; ctx.shadowBlur=8;
    ctx.fillStyle='#ffcc00';
    ctx.fillText(warnLabel, CW/2, CH/2+14);
    ctx.restore();
  }

  // ⑥ 플레이어 발사체
  for (const b of playerBullets) {
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r+3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(80,180,255,0.25)'; ctx.fill();
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fillStyle = '#44aaff'; ctx.fill();
    ctx.beginPath(); ctx.arc(b.x, b.y, 2, 0, Math.PI*2);
    ctx.fillStyle = '#ffffff'; ctx.fill();
  }

  // ⑥-b 아이템 렌더링
  for (const item of items) {
    const IR = 10;
    const col = ITEM_COLORS[item.type];
    const pulse = Math.sin(item.pulse) * 0.3 + 0.7;
    ctx.save();
    ctx.translate(item.px, item.py);

    if (item.bouncing) {
      // 회전 삼각형 (1px 굵기, 채우기 없음)
      const rot = item.pulse * 1.2; // 뱅글뱅글
      ctx.rotate(rot);
      ctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const a = (Math.PI * 2 / 3) * i - Math.PI / 2;
        i === 0 ? ctx.moveTo(Math.cos(a)*IR, Math.sin(a)*IR)
                : ctx.lineTo(Math.cos(a)*IR, Math.sin(a)*IR);
      }
      ctx.closePath();
      ctx.strokeStyle = col;
      ctx.lineWidth = 1;
      ctx.stroke();
      // 중심 글자 (회전 반대로 상쇄해서 항상 바로 보임)
      ctx.rotate(-rot);
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `bold 8px monospace`;
      ctx.fillStyle = col;
      ctx.fillText(ITEM_ICONS[item.type], 0, 0);
    } else {
      // 고정 아이템: 글로우 + 이모지 아이콘
      ctx.beginPath(); ctx.arc(0, 0, IR+4, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${item.type==='prison'?'100,220,255':'255,140,60'},${0.15*pulse})`;
      ctx.fill();
      ctx.beginPath(); ctx.arc(0, 0, IR, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fill();
      ctx.strokeStyle = col; ctx.lineWidth = 1.2*pulse; ctx.stroke();
      // 잔여시간 링
      const ratio = item.despawnTimer / 20000;
      ctx.beginPath();
      ctx.arc(0, 0, IR+2, -Math.PI/2, -Math.PI/2 + Math.PI*2*ratio);
      ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1.5; ctx.stroke();
      // 이모지
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = '10px Segoe UI';
      ctx.fillText(ITEM_ICONS[item.type], 0, 0.5);
    }
    ctx.restore();
  }

  // ⑥-c 프리즌 오버레이 (얼음 결정 효과)
  if (prisonTimer > 0) {
    const alpha = Math.min(0.32, prisonTimer / 5000 * 0.32);
    ctx.fillStyle = `rgba(100,220,255,${alpha})`;
    ctx.fillRect(0, 0, CW, CH);
    // 얼음 테두리 파티클
    ctx.save();
    ctx.strokeStyle = `rgba(200,240,255,${alpha*2})`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 12; i++) {
      const a = PI2/12*i + ts*0.001;
      const rx = CW/2 + Math.cos(a)*CW*0.46, ry = CH/2 + Math.sin(a)*CH*0.46;
      ctx.beginPath(); ctx.moveTo(rx, ry);
      ctx.lineTo(rx - Math.cos(a)*18, ry - Math.sin(a)*18);
      ctx.stroke();
    }
    ctx.restore();
    // 남은시간 표시
    ctx.save();
    ctx.textAlign = 'right'; ctx.textBaseline = 'top';
    ctx.font = 'bold 11px monospace';
    ctx.fillStyle = `rgba(180,240,255,${Math.min(1, prisonTimer/500)})`;
    ctx.fillText(`❄ ${(prisonTimer/1000).toFixed(1)}s`, CW-6, 4);
    ctx.restore();
  }

  // ⑥-d 급속가속 HUD
  if (speedBoostTimer > 0) {
    ctx.save();
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.font = 'bold 11px monospace';
    ctx.fillStyle = `rgba(255,140,60,${Math.min(1, speedBoostTimer/500)})`;
    ctx.fillText(`🌀 ${(speedBoostTimer/1000).toFixed(1)}s`, 6, 4);
    ctx.restore();
  }

  // ⑦ 플레이어
  if (state !== 'over') {
    const blink = state === 'flash' && Math.floor(ts / 120) % 2 === 0;
    if (!blink) {
      const px = PX * CS + CS / 2, py = PY * CS + CS / 2;
      // 급속가속 중 잔상
      if (speedBoostTimer > 0) {
        ctx.beginPath(); ctx.arc(px, py, 13, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,140,60,0.18)'; ctx.fill();
      }
      const col = trail.length > 0 ? '#ffd60a' : drawMode ? '#ff7c00' : '#00ff88';
      ctx.beginPath(); ctx.arc(px, py, 9, 0, Math.PI * 2);
      ctx.fillStyle = trail.length > 0 ? 'rgba(255,214,10,0.25)' : drawMode ? 'rgba(255,124,0,0.25)' : 'rgba(0,255,136,0.25)';
      ctx.fill();
      ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI * 2);
      ctx.fillStyle = col; ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();

      // 머리 위 점령도
      if (pctDisplayTimer > 0) {
        const fadeAlpha = Math.min(1, pctDisplayTimer / 300);
        const pctVal = (claimedCount / (ROWS * COLS) * 100).toFixed(2);
        ctx.save();
        ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
        ctx.font = 'bold 11px monospace';
        ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
        ctx.fillStyle = `rgba(255,255,255,${fadeAlpha})`;
        ctx.fillText(pctVal + '%', px, py - 14);
        ctx.restore();
      }

      // 레벨업 메시지 (아이템 획득 시)
      if (levelUpMsg.timer > 0) {
        const fade = levelUpMsg.timer / LEVEL_MSG_MS;
        const rise = (1 - fade) * 18; // 위로 떠오름
        ctx.save();
        ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
        ctx.font = `bold ${10 + fade*3}px "Courier New", monospace`;
        ctx.shadowColor = levelUpMsg.color;
        ctx.shadowBlur = 8 * fade;
        ctx.fillStyle = levelUpMsg.color.replace(')', `,${fade})`).replace('#', 'rgba(').replace(/([0-9a-f]{2})/gi, (m,c) => parseInt(c,16)+',').slice(0,-1) + `)`;
        // 색상 직접 적용
        const c = levelUpMsg.color;
        const r2 = parseInt(c.slice(1,3),16), g2 = parseInt(c.slice(3,5),16), b2 = parseInt(c.slice(5,7),16);
        ctx.fillStyle = `rgba(${r2},${g2},${b2},${fade})`;
        ctx.fillText(levelUpMsg.text, px, py - 26 - rise);
        ctx.restore();
      }
    }
  }

  // ⑦ 클리어 / 게임오버 오버레이
  if (state === 'win' || state === 'over') {
    if (state === 'win' && hasImg) {
      ctx.drawImage(fullC, 0, 0);
    } else if (state === 'win') {
      ctx.fillStyle = '#2d6a4f';
      ctx.fillRect(0, 0, CW, CH);
    }

    if (state === 'over' || !winOverlayHidden) {
      ctx.fillStyle = state === 'win' ? 'rgba(0,0,0,0.50)' : 'rgba(0,0,0,0.70)';
      ctx.fillRect(0, 0, CW, CH);
      ctx.textAlign = 'center';

      if (state === 'win') {
        // ── 스테이지 클리어 ──
        ctx.font = `bold 38px 'Press Start 2P', monospace`;
        ctx.fillStyle = '#00ff88';
        ctx.fillText(`STAGE ${stageNum} CLEAR!`, CW/2, CH/2 - 50);
        if (hasImg) {
          ctx.font = `12px 'Press Start 2P', monospace`;
          ctx.fillStyle = '#ffd60a';
          ctx.fillText('이미지가 공개되었습니다', CW/2, CH/2 - 14);
        }
        ctx.font = `11px 'Press Start 2P', monospace`;
        ctx.fillStyle = '#ffd60a';
        ctx.fillText(`SCORE  ${String(score).padStart(8,'0')}`, CW/2, CH/2 + 18);
        ctx.font = `10px 'Press Start 2P', monospace`;
        ctx.fillStyle = '#aaa';
        ctx.fillText('SPACE - NEXT STAGE', CW/2, CH/2 + 52);
        ctx.fillStyle = '#666';
        ctx.fillText('R - RESTART GAME', CW/2, CH/2 + 74);
        if (hasImg) {
          ctx.fillStyle = '#555';
          ctx.font = `9px 'Press Start 2P', monospace`;
          ctx.fillText('클릭으로 이미지 감상', CW/2, CH/2 + 96);
        }
      } else {
        // ── 게임오버 ──
        ctx.font = `bold 36px 'Press Start 2P', monospace`;
        ctx.fillStyle = '#e94560';
        ctx.fillText('GAME OVER', CW/2, CH/2 - 48);
        ctx.font = `11px 'Press Start 2P', monospace`;
        ctx.fillStyle = '#ffd60a';
        ctx.fillText(`FINAL SCORE`, CW/2, CH/2 - 6);
        ctx.font = `18px 'Press Start 2P', monospace`;
        ctx.fillStyle = '#ffffff';
        ctx.fillText(String(score).padStart(8,'0'), CW/2, CH/2 + 24);
        ctx.font = `9px 'Press Start 2P', monospace`;
        ctx.fillStyle = '#ffd60a';
        ctx.fillText(`STAGE ${stageNum}`, CW/2, CH/2 + 52);
        ctx.font = `9px 'Press Start 2P', monospace`;
        ctx.fillStyle = '#888';
        ctx.fillText('R - RESTART', CW/2, CH/2 + 74);
      }
    }
  }

  // ⑧ 일시정지 오버레이
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.52)';
    ctx.fillRect(0, 0, CW, CH);
    ctx.textAlign = 'center';
    ctx.font = `bold 28px 'Press Start 2P', monospace`;
    ctx.fillStyle = '#ffd60a';
    ctx.fillText('PAUSE', CW/2, CH/2 - 10);
    ctx.font = `9px 'Press Start 2P', monospace`;
    ctx.fillStyle = '#aaa';
    ctx.fillText('SPACE - RESUME', CW/2, CH/2 + 22);
  }

  // ⑨ SCORE / STAGE 상단/하단 HUD (항상 최상위 렌더)
  ctx.save();
  ctx.textAlign = 'center';
  // 상단 중앙 — SCORE
  ctx.font = `bold 10px 'Press Start 2P', monospace`;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(CW/2 - 90, 4, 180, 18);
  ctx.fillStyle = '#ffffff';
  ctx.fillText(`SCORE  ${String(score).padStart(8,'0')}`, CW/2, 17);
  // 하단 중앙 — STAGE
  ctx.font = `bold 9px 'Press Start 2P', monospace`;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(CW/2 - 70, CH - 22, 140, 16);
  ctx.fillStyle = '#ffffff';
  ctx.fillText(`STAGE - ${stageNum}`, CW/2, CH - 10);
  ctx.restore();
}

// ─── 메인 루프 ─────────────────────────────────────────────────────────────
let lastTs = 0, dt = 16;

function loop(ts) {
  dt = Math.min(ts - lastTs, 50);
  lastTs = ts;

  if (!paused && (state === 'play' || state === 'flash')) {
    // ── 역추적 (Z 뗀 후 자동 후퇴) ──
    if (retracing) {
      for (let _r = 0; _r < RETRACE_SPD; _r++) {
        if (trail.length > 0) {
          const [tc, tr] = trail.pop();
          G[tr][tc] = 0;
          if (trail.length % 4 === 0) SFX.retraceTick();
          if (trail.length > 0) {
            PX = trail[trail.length - 1][0];
            PY = trail[trail.length - 1][1];
          } else {
            PX = trailStartX; PY = trailStartY;
            retracing = false;
            break;
          }
        } else {
          retracing = false;
          break;
        }
      }
    }

    // 프레임 카운터 기반 이동 (역추적 중에는 수동 이동 차단)
    if (state === 'play' && moveDir && !retracing) {
      if (moveCooldown <= 0) {
        const [dx, dy] = moveDir;
        const curSpeed = speedBoostTimer > 0 ? 8 : baseSpeed;
        const steps = Math.max(1, Math.floor(curSpeed));
        const isDiag = dx !== 0 && dy !== 0;
        if (isDiag) {
          // 1스텝 시험: 양 축 모두 이동 가능 → 진짜 대각선 / 한 축만 → 외곽선 직선 주행
          const movedX = move(dx, 0);
          const movedY = move(0, dy);
          if (movedX && movedY) {
            // 진짜 대각선 → steps × (1/√2) 로 이동거리를 직선과 동일하게 보정
            const diagSteps = Math.max(1, Math.round(steps * Math.SQRT1_2));
            for (let _s = 1; _s < diagSteps; _s++) {
              move(dx, 0);
              move(0, dy);
            }
          } else {
            // 한 축이 막힌 경우(외곽선 직선 주행) → 나머지 steps-1 만큼 이동 가능한 축으로 직선 이동
            for (let _s = 1; _s < steps; _s++) {
              if (movedX) move(dx, 0); else move(0, dy);
            }
          }
        } else {
          // 직선 이동: 슬라이드(대각 2-move)는 √2 비용으로 자유대각과 동일하게 속도 균일화
          let budget = steps;
          while (budget >= 1) {
            const result = moveWithSlide(dx, dy);
            if (!result) break;
            budget -= (result === 'slide') ? Math.SQRT2 : 1;
          }
        }
        moveCooldown = (moveCooldown === 0) ? MOVE_FIRST : MOVE_RPT;
      } else {
        moveCooldown--;
      }
    }
    if (state === 'flash') {
      if (--flashT <= 0) { state = 'play'; isDead = false; $('msg').textContent = ''; }
    }
    updateEnemies();
    updatePlayerBullets();
    updateItems();
    updateParticles();
    if (pctDisplayTimer > 0) {
      pctDisplayTimer -= dt;
      // 타이머가 막 만료된 순간 → 베이스라인을 현재 pct로 즉시 동기화
      // (다음 closeTrail 호출 타이밍과 무관하게 "표시 꺼진 시점의 pct"를 정확히 기록)
      if (pctDisplayTimer <= 0) {
        lastBonusPct = claimedCount / (ROWS * COLS) * 100;
      }
    }
    if (levelUpMsg.timer > 0) levelUpMsg.timer -= dt;
    if (rageWarnTimer > 0) rageWarnTimer -= dt;
    // 효과 타이머
    if (prisonTimer > 0) {
      prisonTimer -= dt;
      prisonTickTimer -= dt;
      if (prisonTickTimer <= 0) { SFX.prisonTick(); prisonTickTimer = 500; }
    }
    if (speedBoostTimer > 0) speedBoostTimer -= dt;
    // 아이템 스폰 — bounce(스피드/파워) 최대 6개 제한
    const bounceCount = items.filter(it => it.bouncing).length;
    if (bounceCount < 6) {
      itemSpawnTimer -= dt;
      if (itemSpawnTimer <= 0) { spawnItem('bounce'); itemSpawnTimer = 20000; }
    }
    itemSpawnTimer2 -= dt;
    if (itemSpawnTimer2 <= 0) { spawnItem('fixed'); itemSpawnTimer2 = 30000; }
  }

  draw(ts);
  requestAnimationFrame(loop);
}

// ─── 시작 ──────────────────────────────────────────────────────────────────
init();
requestAnimationFrame(loop);
</script>
</body>
</html>
